[theme]
primaryColor = "#FF4B4B"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#262730"
textColor = "#FAFAFA"
font = "sans serif"

[browser]
gatherUsageStats = false

[server]
maxUploadSize = 10
enableCORS = false
enableXsrfProtection = true

[runner]
magicEnabled = true

[logger]
level = "info"

[client]
showErrorDetails = true
toolbarMode = "auto"
